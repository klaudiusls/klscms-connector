name: Build & Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep "Version:" klscms-connector.php \
            | head -1 \
            | grep -oP '[\d]+\.[\d]+\.[\d]+')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Build plugin zip
        run: |
          mkdir -p build/klscms-connector
          # Need to copy everything that is part of the plugin, not just includes and services.
          # The user's example only copies includes, services, and main file. Let's make sure elementor/ and database/ are included if they exist.
          cp -r includes services elementor database klscms-connector.php build/klscms-connector/ 2>/dev/null || true
          
          # Hapus file yang tidak perlu
          find build/ -name "*.git" -type d -exec rm -rf {} + 2>/dev/null || true
          cd build
          zip -r ../klscms-connector-v${{ steps.get_version.outputs.VERSION }}.zip klscms-connector/
          cd ..
          echo "Built: klscms-connector-v${{ steps.get_version.outputs.VERSION }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.get_version.outputs.VERSION }}
          files: klscms-connector-v${{ steps.get_version.outputs.VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
